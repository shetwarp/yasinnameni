<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yasin Namani • Windows 11</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;500;600&amp;display=swap');
        
        :root {
            --accent: #3b82f6;
        }
        
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        
        .desktop {
            background: linear-gradient(145deg, #0f172a 0%, #1e3a8a 35%, #312e81 65%, #1e40af 100%);
            transition: background 0.4s ease, filter 0.3s ease;
        }
        
        .desktop.dark {
            background: linear-gradient(145deg, #111827 0%, #1e2937 100%);
        }
        
        .window {
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
            animation: windowOpen 0.15s cubic-bezier(0.32, 0.72, 0, 1);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #64748b25;
            max-width: 95vw;
            max-height: calc(100vh - 70px);
        }
        
        .title-bar {
            background: linear-gradient(to bottom, #f8fafc, #f1e7ff);
        }
        
        .dark .title-bar {
            background: linear-gradient(to bottom, #334155, #1e2937);
            color: #e2e8f0;
        }
        
        .desktop-icon {
            transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1);
            user-select: none;
        }
        
        .desktop-icon:hover {
            transform: scale(1.06);
            background-color: rgba(255,255,255,0.12);
        }
        
        .icon-bg {
            width: 54px;
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            box-shadow: 0 8px 16px -4px rgb(0 0 0 / 0.25);
        }
        
        .taskbar {
            background: rgba(15, 23, 42, 0.96);
            backdrop-filter: blur(30px);
        }
        
        .start-menu {
            animation: startPop 0.2s cubic-bezier(0.32, 0.72, 0, 1);
        }
        
        .win11-btn:hover {
            background-color: rgba(255,255,255,0.2);
        }
        
        .win11-btn.close:hover {
            background-color: #ef4444;
            color: white;
        }

        .paint-canvas {
            touch-action: none;
            background: #f8fafc;
            cursor: crosshair;
        }

        .tool-btn {
            transition: all 0.1s;
        }
        .tool-btn.active {
            background-color: #3b82f6;
            color: white;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
        }

        .tab {
            transition: all 0.1s;
        }
        .tab.active {
            background: white;
            border-bottom: 2px solid #3b82f6;
        }

        .sticky-note {
            box-shadow: 2px 4px 12px rgba(0,0,0,0.15);
            transition: box-shadow 0.2s;
        }
        .sticky-note:hover {
            box-shadow: 4px 8px 20px rgba(0,0,0,0.2);
        }

        .file-item {
            transition: background 0.1s;
        }
        .file-item:hover {
            background-color: #f1f5f9;
        }
        .dark .file-item:hover {
            background-color: #334155;
        }

        .ai-message {
            max-width: 85%;
        }

        @media (max-width: 768px) {
            .desktop-icon {
                width: 68px !important;
            }
            .icon-bg {
                width: 46px !important;
                height: 46px !important;
            }
            .desktop-icon span {
                font-size: 9px !important;
            }
            .taskbar {
                height: 46px !important;
            }
            .window {
                border-radius: 8px;
                box-shadow: 0 10px 30px -10px rgb(0 0 0 / 0.5);
            }
            .title-bar {
                height: 40px !important;
                padding-left: 8px !important;
                padding-right: 4px !important;
            }
            #desktop-icons {
                width: 260px !important;
                left: 8px !important;
                top: 8px !important;
            }
        }
    </style>
</head>
<body class="overflow-hidden bg-zinc-950">
    <!-- DESKTOP -->
    <div id="desktop" class="desktop w-screen h-screen relative select-none"
         oncontextmenu="showContextMenu(event); return false;"
         onclick="handleDesktopClick(event)">
        
        <!-- Desktop Icons Container (will be populated by JS for drag support) -->
        <div id="desktop-icons" class="absolute top-5 left-5 z-10" style="width: min(480px, 92vw); min-height: 520px;"></div>

        <div id="window-container" class="absolute inset-0 z-20 pointer-events-none"></div>
    </div>

    <!-- TASKBAR -->
    <div class="taskbar fixed bottom-0 left-0 right-0 h-[52px] border-t border-zinc-700 flex items-center px-2 z-[60] text-white text-sm">
        <div class="flex items-center h-full flex-1">
            
            <!-- Start Button -->
            <button onclick="toggleStartMenu(event)"
                    class="h-9 px-3 mx-1 flex items-center gap-2 hover:bg-white/10 active:bg-white/20 rounded-2xl transition-all active:scale-[0.92]">
                <div class="w-[18px] h-[18px] grid grid-cols-2 gap-[1.5px]">
                    <div class="bg-[#f25022] rounded-sm"></div>
                    <div class="bg-[#7fba00] rounded-sm"></div>
                    <div class="bg-[#00a4ef] rounded-sm"></div>
                    <div class="bg-[#ffb900] rounded-sm"></div>
                </div>
            </button>
            
            <div onclick="showSearchFake()" class="hidden md:flex items-center bg-white/10 hover:bg-white/15 transition px-4 h-8 w-72 rounded-3xl text-zinc-300 text-xs cursor-pointer mx-1.5">
                <i class="fas fa-search mr-2.5 text-xs"></i>
                <span>Search</span>
            </div>
            
            <div class="flex items-center gap-px ml-1">
                <div onclick="openWindow('explorer')" class="h-8 w-8 flex items-center justify-center hover:bg-white/10 active:bg-white/20 rounded-2xl cursor-pointer transition"><i class="fas fa-folder text-sky-300"></i></div>
                <div onclick="openWindow('chrome')" class="h-8 w-8 flex items-center justify-center hover:bg-white/10 active:bg-white/20 rounded-2xl cursor-pointer transition"><i class="fas fa-globe text-sky-300"></i></div>
                <div onclick="openWindow('notepad')" class="h-8 w-8 flex items-center justify-center hover:bg-white/10 active:bg-white/20 rounded-2xl cursor-pointer transition"><i class="fas fa-file-lines text-amber-300"></i></div>
            </div>
        </div>
        
        <div class="flex items-center gap-x-1 pr-3 text-xs cursor-pointer" onclick="toggleTrayPanel()">
            <div class="flex items-center gap-x-2 text-zinc-300 px-2 py-1 hover:bg-white/10 rounded-2xl transition" id="tray-icons">
                <i class="fas fa-wifi" id="wifi-icon" onclick="event.stopImmediatePropagation(); toggleWifi();"></i>
                <i class="fas fa-volume-up" onclick="event.stopImmediatePropagation(); toggleTrayPanel();"></i>
                <i class="fas fa-battery-full"></i>
            </div>
            <div id="clock" onclick="event.stopImmediatePropagation(); toggleTrayPanel()" class="font-mono text-xs px-3 py-1 hover:bg-white/10 rounded-2xl cursor-pointer transition tracking-tighter"></div>
            
            <!-- Voice Assistant Mic -->
            <button onclick="startVoiceAssistant()" class="ml-1 px-2.5 py-1 text-xs hover:bg-white/10 rounded-xl flex items-center gap-1 transition" title="Voice Assistant (Hey Yasin)">
                <i class="fas fa-microphone text-emerald-400"></i>
            </button>
            
            <!-- Fullscreen Button -->
            <button onclick="toggleFullscreen()" class="ml-1 px-2 py-1 text-xs hover:bg-white/10 rounded-xl flex items-center gap-1 transition">
                <i class="fas fa-expand text-sm"></i>
            </button>
        </div>
    </div>

    <!-- START MENU -->
    <div id="start-menu" class="hidden fixed bottom-[58px] left-3 w-[360px] bg-zinc-900/95 backdrop-blur-2xl border border-zinc-700 rounded-3xl shadow-2xl z-[70] flex flex-col overflow-hidden start-menu">
        <div class="p-5">
            <div class="flex items-center gap-3 mb-5">
                <div class="w-10 h-10 bg-gradient-to-br from-violet-500 to-indigo-600 rounded-2xl flex items-center justify-center shadow-inner">
                    <i class="fas fa-user text-white text-2xl"></i>
                </div>
                <div>
                    <div class="font-semibold text-lg">Yasin Namani</div>
                    <div class="text-xs text-zinc-400">yasin.namani.dev</div>
                </div>
            </div>
            
            <div class="mb-2">
                <div class="text-xs font-medium text-zinc-400 px-1 mb-2">My Projects</div>
                <div class="grid grid-cols-3 gap-2 text-xs">
                    <div onclick="openProjectFromStart('yasin', 'https://yasin-namani.github.io/yasin-namani.com/')" class="flex flex-col items-center p-2 hover:bg-white/10 rounded-2xl cursor-pointer">
                        <i class="fas fa-user text-xl text-violet-400 mb-1"></i>
                        <span class="text-center">یاسین نامنی</span>
                    </div>
                    <div onclick="openProjectFromStart('prank', 'https://shetwarp.github.io/we-are-friend-/')" class="flex flex-col items-center p-2 hover:bg-white/10 rounded-2xl cursor-pointer">
                        <i class="fas fa-grin-tongue-wink text-xl text-pink-400 mb-1"></i>
                        <span class="text-center">Prank</span>
                    </div>
                    <div onclick="openProjectFromStart('counter', 'https://shetwarp.github.io/Shetline/')" class="flex flex-col items-center p-2 hover:bg-white/10 rounded-2xl cursor-pointer">
                        <i class="fas fa-crosshairs text-xl text-red-400 mb-1"></i>
                        <span class="text-center">کانتر استرایک</span>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="mt-auto border-t border-zinc-700 p-3 bg-zinc-950/60 flex items-center justify-between text-xs">
            <div onclick="shutdownFake()" class="flex items-center gap-2 px-3 py-1 hover:bg-white/10 rounded-2xl cursor-pointer text-red-300 hover:text-red-400 transition">
                <i class="fas fa-power-off"></i>
                <span class="font-medium">Power</span>
            </div>
            <div class="text-[10px] text-zinc-500 pr-2">Windows 11</div>
        </div>
    </div>

    <!-- CONTEXT MENU -->
    <div id="context-menu" class="hidden absolute bg-zinc-800 border border-zinc-600 rounded-2xl shadow-2xl py-1.5 text-sm z-[80] w-52">
        <div onclick="hideContextMenu(); location.reload()" class="px-4 py-[7px] hover:bg-white/10 cursor-pointer flex items-center gap-3 mx-1 rounded-xl">
            <i class="fas fa-sync-alt w-4"></i> <span>Refresh</span>
        </div>
        <div class="h-px bg-zinc-700 my-1 mx-2"></div>
        <div onclick="hideContextMenu(); createNewFolderFake()" class="px-4 py-[7px] hover:bg-white/10 cursor-pointer flex items-center gap-3 mx-1 rounded-xl">
            <i class="fas fa-folder-plus w-4"></i> <span>New folder</span>
        </div>
        <div onclick="hideContextMenu(); openWindow('notes')" class="px-4 py-[7px] hover:bg-white/10 cursor-pointer flex items-center gap-3 mx-1 rounded-xl">
            <i class="fas fa-sticky-note w-4"></i> <span>New Sticky Note</span>
        </div>
        <div onclick="hideContextMenu(); openWindow('screenshot')" class="px-4 py-[7px] hover:bg-white/10 cursor-pointer flex items-center gap-3 mx-1 rounded-xl">
            <i class="fas fa-camera w-4"></i> <span>Snipping Tool</span>
        </div>
    </div>

    <!-- TRAY PANEL -->
    <div id="tray-panel" class="hidden fixed bottom-[58px] right-3 w-[360px] bg-zinc-900/95 backdrop-blur-2xl border border-zinc-700 rounded-3xl shadow-2xl z-[75]">
        <div class="p-5">
            <div class="flex justify-between mb-4">
                <span class="font-semibold">Quick settings</span>
                <button onclick="toggleTrayPanel()" class="text-zinc-400"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="grid grid-cols-2 gap-3 mb-4">
                <div onclick="toggleWifi()" class="flex items-center gap-3 p-3 bg-zinc-800 hover:bg-zinc-700 rounded-2xl cursor-pointer">
                    <div class="w-9 h-9 bg-sky-500 rounded-2xl flex items-center justify-center">
                        <i class="fas fa-wifi text-white" id="panel-wifi-icon"></i>
                    </div>
                    <div>
                        <div class="font-medium text-sm">Wi-Fi</div>
                        <div class="text-xs text-emerald-400" id="wifi-status">Connected</div>
                    </div>
                </div>
                <div onclick="toggleBluetooth(this)" class="flex items-center gap-3 p-3 bg-zinc-800 hover:bg-zinc-700 rounded-2xl cursor-pointer">
                    <div class="w-9 h-9 bg-blue-500 rounded-2xl flex items-center justify-center">
                        <i class="fas fa-bluetooth-b text-white"></i>
                    </div>
                    <div>
                        <div class="font-medium text-sm">Bluetooth</div>
                        <div class="text-xs text-emerald-400">On</div>
                    </div>
                </div>
            </div>
            
            <div class="space-y-4">
                <div>
                    <div class="flex justify-between text-xs mb-1 px-1"><span>Volume</span><span id="volume-value">70%</span></div>
                    <input type="range" id="volume-slider" min="0" max="100" value="70" class="w-full accent-sky-500" oninput="updateVolume(this)">
                </div>
                <div>
                    <div class="flex justify-between text-xs mb-1 px-1"><span>Brightness</span><span id="brightness-value">85%</span></div>
                    <input type="range" id="brightness-slider" min="30" max="100" value="85" class="w-full accent-yellow-500" oninput="updateBrightness(this)">
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==================== GLOBAL STATE ====================
        let windowCounter = 0;
        let isDragging = false;
        let currentDragWin = null;
        let offsetX = 0, offsetY = 0;
        let startMenuOpen = false;
        let wifiOn = true;
        
        let openWindowsList = []; // For Task Manager
        let fileSystem = { folders: [], files: [] };
        let desktopIcons = [];
        let notesList = [];
        let paintHistory = [];
        let currentPaintTool = 'pencil';
        
        const PROJECTS = {
            yasin: "https://yasin-namani.github.io/yasin-namani.com/",
            prank: "https://shetwarp.github.io/we-are-friend-/",
            counter: "https://shetwarp.github.io/Shetline/",
            robot: "https://yasin-namani.github.io/pica.pat/",
            bluecode: "https://shetwarp.github.io/bluecode/",
            shetcoin: "https://shetwarp.github.io/shetcoin/",
            fifa2d: "https://shetwarp.github.io/fifa2d/",
            news: "https://shetwarp.github.io/shetwarpnews/",
            ai: "https://shetwarp.github.io/shetwarpbot/",
            chatwarp: "https://shetwarp.github.io/chatwarp/"
        };

        // ==================== PERSISTENCE ====================
        function saveToLocalStorage() {
            try {
                localStorage.setItem('win11_fs', JSON.stringify(fileSystem));
                localStorage.setItem('win11_notes', JSON.stringify(notesList));
                localStorage.setItem('win11_desktop_icons', JSON.stringify(desktopIcons));
                localStorage.setItem('win11_settings', JSON.stringify({
                    accent: getComputedStyle(document.documentElement).getPropertyValue('--accent'),
                    darkMode: document.getElementById('desktop').classList.contains('dark')
                }));
            } catch(e) {}
        }

        function loadFromLocalStorage() {
            try {
                const fs = localStorage.getItem('win11_fs');
                if (fs) fileSystem = JSON.parse(fs);
                
                const notes = localStorage.getItem('win11_notes');
                if (notes) notesList = JSON.parse(notes);
                
                const icons = localStorage.getItem('win11_desktop_icons');
                if (icons) desktopIcons = JSON.parse(icons);
                
                const settings = localStorage.getItem('win11_settings');
                if (settings) {
                    const s = JSON.parse(settings);
                    if (s.accent) document.documentElement.style.setProperty('--accent', s.accent);
                    if (s.darkMode) {
                        const desk = document.getElementById('desktop');
                        if (s.darkMode) desk.classList.add('dark');
                    }
                }
            } catch(e) {}
        }

        // ==================== DESKTOP ICONS (Draggable) ====================
        const DEFAULT_ICONS = [
            { id: 'yasin', label: 'یاسین نامنی', icon: 'fa-user', color: 'from-violet-500 via-purple-500 to-indigo-600', type: 'project', url: PROJECTS.yasin },
            { id: 'prank', label: 'Prank', icon: 'fa-grin-tongue-wink', color: 'from-pink-500 to-rose-500', type: 'project', url: PROJECTS.prank },
            { id: 'counter', label: 'کانتر استرایک', icon: 'fa-crosshairs', color: 'from-red-500 to-orange-600', type: 'project', url: PROJECTS.counter },
            { id: 'robot', label: 'ربات هوشمند', icon: 'fa-robot', color: 'from-emerald-400 to-teal-600', type: 'project', url: PROJECTS.robot },
            { id: 'bluecode', label: 'آموزش برنامه‌نویسی', icon: 'fa-code', color: 'from-blue-500 to-cyan-500', type: 'project', url: PROJECTS.bluecode },
            { id: 'fifa2d', label: 'فیفا 2 بعدی', icon: 'fa-futbol', color: 'from-emerald-500 to-green-600', type: 'project', url: PROJECTS.fifa2d },
            { id: 'news', label: 'اخبار', icon: 'fa-newspaper', color: 'from-sky-500 to-blue-600', type: 'project', url: PROJECTS.news },
            { id: 'explorer', label: 'This PC', icon: 'fa-folder', color: 'from-sky-400 to-blue-600', type: 'app', app: 'explorer' },
            { id: 'recycle', label: 'Recycle Bin', icon: 'fa-trash', color: 'from-zinc-400 to-zinc-600', type: 'app', app: 'recycle' },
            { id: 'chrome', label: 'Chrome', icon: 'fa-globe', color: 'from-sky-400 to-blue-500', type: 'app', app: 'chrome' },
            { id: 'calculator', label: 'Calculator', icon: 'fa-calculator', color: 'from-emerald-400 to-teal-500', type: 'app', app: 'calculator' },
            { id: 'paint', label: 'Paint', icon: 'fa-paint-brush', color: 'from-pink-400 to-rose-500', type: 'app', app: 'paint' },
            { id: 'terminal', label: 'Terminal', icon: 'fa-terminal', color: 'from-zinc-700 to-black', type: 'app', app: 'terminal' },
            { id: 'notepad', label: 'Notepad', icon: 'fa-file-lines', color: 'from-amber-400 to-yellow-500', type: 'app', app: 'notepad' },
            { id: 'settings', label: 'Settings', icon: 'fa-cog', color: 'from-slate-400 to-zinc-600', type: 'app', app: 'settings' },
            { id: 'camera', label: 'Camera', icon: 'fa-video', color: 'from-rose-400 to-pink-600', type: 'app', app: 'camera' },
            { id: 'notes', label: 'Sticky Notes', icon: 'fa-sticky-note', color: 'from-yellow-400 to-amber-500', type: 'app', app: 'notes' },
            { id: 'minecraftweb', label: 'ماینکرافت', icon: 'fa-gamepad', color: 'from-green-500 to-cyan-500', type: 'project', url: 'https://shetwarp.github.io/minecraftweb/' },
            { id: 'ai', label: 'AI', icon: 'fa-robot', color: 'from-violet-500 to-fuchsia-500', type: 'project', url: 'https://shetwarp.github.io/shetwarpbot/' },
            { id: 'chatwarp', label: 'چت وارپ', icon: 'fa-comments', color: 'from-sky-400 to-blue-500', type: 'project', url: 'https://shetwarp.github.io/chatwarp/' },
            { id: 'taskmgr', label: 'Task Manager', icon: 'fa-tasks', color: 'from-blue-400 to-indigo-500', type: 'app', app: 'taskmgr' }
        ];

        function initDesktopIcons() {
            const container = document.getElementById('desktop-icons');
            container.innerHTML = '';
            container.style.position = 'absolute';

            const isMobile = window.innerWidth < 768;
            
            // Responsive columns and width
            const COLS = isMobile ? 3 : 5;
            const COL_WIDTH = isMobile ? 85 : 92;
            const ROW_HEIGHT = isMobile ? 95 : 100;
            const containerWidth = isMobile ? '280px' : '480px';

            container.style.width = containerWidth;

            // Always reset to a clean, perfect grid
            desktopIcons = DEFAULT_ICONS.map((icon, i) => ({
                ...icon,
                x: 8 + (i % COLS) * COL_WIDTH,
                y: 8 + Math.floor(i / COLS) * ROW_HEIGHT
            }));
            
            desktopIcons.forEach((icon) => {
                const el = document.createElement('div');
                el.className = `desktop-icon group absolute w-[82px] flex flex-col items-center p-2 rounded-3xl cursor-pointer`;
                el.style.left = `${icon.x}px`;
                el.style.top = `${icon.y}px`;
                el.dataset.id = icon.id;
                
                el.innerHTML = `
                    <div class="icon-bg bg-gradient-to-br ${icon.color}">
                        <i class="fas ${icon.icon} text-white text-[27px]"></i>
                    </div>
                    <span class="text-white text-[10px] mt-1.5 text-center font-medium tracking-tight leading-tight">${icon.label}</span>
                `;
                
                // Click handler only (no dragging)
                el.addEventListener('click', (e) => {
                    if (icon.type === 'project') {
                        openProject(icon.id, icon.url);
                    } else {
                        openWindow(icon.app);
                    }
                });
                
                container.appendChild(el);
            });
        }

        // ==================== WINDOW MANAGEMENT ====================
        function updateOpenWindowsList() {
            openWindowsList = [];
            document.querySelectorAll('#window-container > div').forEach(win => {
                const titleEl = win.querySelector('.title-bar span.font-semibold');
                openWindowsList.push({
                    id: win.id,
                    title: titleEl ? titleEl.textContent : 'Window'
                });
            });
        }

        function bringToFront(win) {
            const all = document.querySelectorAll('#window-container > div');
            let max = 150;
            all.forEach(w => { 
                const z = parseInt(w.style.zIndex) || 150; 
                if (z > max) max = z; 
            });
            win.style.zIndex = max + 1;
            updateOpenWindowsList();
        }

        function closeWindow(id) { 
            const w = document.getElementById(id); 
            if (w) {
                w.remove(); 
                updateOpenWindowsList();
            }
        }
        
        function minimizeWindow(id) { 
            const w = document.getElementById(id); 
            if (w) w.style.display = 'none'; 
        }
        
        function maximizeWindow(id) {
            const w = document.getElementById(id);
            if (!w) return;
            if (w.dataset.max === 'true') {
                w.style.left = w.dataset.pl || '130px';
                w.style.top = w.dataset.pt || '65px';
                w.style.width = w.dataset.pw || '740px';
                w.style.height = w.dataset.ph || '520px';
                w.dataset.max = 'false';
            } else {
                w.dataset.pl = w.style.left; 
                w.dataset.pt = w.style.top;
                w.dataset.pw = w.style.width; 
                w.dataset.ph = w.style.height;
                w.style.left = '6px'; 
                w.style.top = '6px';
                w.style.width = 'calc(100% - 12px)'; 
                w.style.height = 'calc(100% - 64px)';
                w.dataset.max = 'true';
            }
        }

        function openWindow(type) {
            windowCounter++;
            const container = document.getElementById('window-container');
            const win = document.createElement('div');
            win.id = `win-${windowCounter}`;
            win.className = `window absolute bg-white flex flex-col pointer-events-auto shadow-2xl`;
            
            let w = 740, h = 520;
            let left = 130 + (windowCounter % 7) * 32;

        // ==================== FILE EXPLORER ====================
        function renderExplorer(winId) {
            const num = winId.split('-')[1];
            const content = document.getElementById('explorer-content-' + num);
            if (!content) return;
            
            let html = `<div class="mb-2 text-xs text-zinc-500">My Projects &amp; Files (localStorage)</div>`;
            
            // Folders
            if (fileSystem.folders && fileSystem.folders.length > 0) {
                html += `<div class="mb-1 font-medium text-xs px-1">Folders</div>`;
                fileSystem.folders.forEach((folder, idx) => {
                    html += `
                        <div class="file-item flex items-center gap-3 p-2.5 rounded-2xl cursor-pointer" ondblclick="openFolder('${winId}', ${idx})">
                            <i class="fas fa-folder text-yellow-500 text-xl"></i>
                            <div class="flex-1">
                                <div class="font-medium">${folder.name}</div>
                            </div>
                            <button onclick="event.stopImmediatePropagation(); renameItem('${winId}', 'folder', ${idx});" class="text-xs px-2 py-0.5 hover:bg-zinc-200 rounded">Rename</button>
                            <button onclick="event.stopImmediatePropagation(); deleteItem('${winId}', 'folder', ${idx});" class="text-xs px-2 py-0.5 text-red-500 hover:bg-red-100 rounded">Delete</button>
                        </div>
                    `;
                });
            }
            
            // Files
            html += `<div class="mt-3 mb-1 font-medium text-xs px-1">Files</div>`;
            if (!fileSystem.files || fileSystem.files.length === 0) {
                // Seed some default files
                fileSystem.files = [
                    { name: "README.md", content: "# Welcome to Yasin's Windows 11" },
                    { name: "projects.txt", content: "List of my web projects" }
                ];
            }
            
            fileSystem.files.forEach((file, idx) => {
                html += `
                    <div class="file-item flex items-center gap-3 p-2.5 rounded-2xl" ondblclick="openFile('${winId}', ${idx})">
                        <i class="fas fa-file-alt text-blue-500 text-xl"></i>
                        <div class="flex-1">
                            <div class="font-medium">${file.name}</div>
                        </div>
                        <button onclick="event.stopImmediatePropagation(); renameItem('${winId}', 'file', ${idx});" class="text-xs px-2 py-0.5 hover:bg-zinc-200 rounded">Rename</button>
                        <button onclick="event.stopImmediatePropagation(); deleteItem('${winId}', 'file', ${idx});" class="text-xs px-2 py-0.5 text-red-500 hover:bg-red-100 rounded">Delete</button>
                    </div>
                `;
            });
            
            content.innerHTML = html;
            saveToLocalStorage();
        }
        
        function createNewFolderInExplorer(winId) {
            // Limit to maximum 1 folder only
            if (fileSystem.folders && fileSystem.folders.length >= 1) {
                alert('فقط یک فولدر می‌تونی بسازی!');
                return;
            }

            const name = prompt('نام فولدر:', 'New Folder');
            if (!name) return;

            if (!fileSystem.folders) fileSystem.folders = [];
            fileSystem.folders.push({ name: name, files: [] });
            saveToLocalStorage();
            renderExplorer(winId);
        }
        
        function renameItem(winId, type, index) {
            const item = type === 'folder' ? fileSystem.folders[index] : fileSystem.files[index];
            const newName = prompt('New name:', item.name);
            if (!newName) return;
            item.name = newName;
            saveToLocalStorage();
            renderExplorer(winId);
        }
        
        function deleteItem(winId, type, index) {
            if (!confirm('Move to Recycle Bin?')) return;
            const item = type === 'folder' ? fileSystem.folders.splice(index, 1)[0] : fileSystem.files.splice(index, 1)[0];
            if (!fileSystem.recycle) fileSystem.recycle = [];
            fileSystem.recycle.push({ ...item, type, deleted: new Date().toISOString() });
            saveToLocalStorage();
            renderExplorer(winId);
            // Also refresh recycle if open
            document.querySelectorAll('[id^="win-"]').forEach(w => {
                if (w.innerHTML.includes('Recycle Bin')) {
                    const num = w.id.split('-')[1];
                    renderRecycleBin(w.id);
                }
            });
        }
        
        function openFolder(winId, index) {

        // ==================== ENHANCED PAINT ====================
        let paintCtx = null;
        let paintCanvas = null;
        let isPainting = false;
        let lastX = 0, lastY = 0;
        let currentTool = 'pencil';
        let paintHistoryStack = [];
        
        function initEnhancedPaint(winId) {
            const num = winId.split('-')[1];
            paintCanvas = document.getElementById('paint-canvas-' + num);
            if (!paintCanvas) return;
            
            paintCtx = paintCanvas.getContext('2d', { alpha: true });
            
            function resize() {
                const parent = paintCanvas.parentElement;
                const rect = parent.getBoundingClientRect();
                const dpr = window.devicePixelRatio || 1;
                
                paintCanvas.width = Math.floor(rect.width * dpr);
                paintCanvas.height = Math.floor(rect.height * dpr);
                paintCanvas.style.width = rect.width + 'px';
                paintCanvas.style.height = rect.height + 'px';
                
                paintCtx.scale(dpr, dpr);
                paintCtx.fillStyle = '#f8fafc';
                paintCtx.fillRect(0, 0, rect.width, rect.height);
                
                // Save initial state
                savePaintState();
            }
            
            resize();
            new ResizeObserver(resize).observe(paintCanvas.parentElement);
            
            // Drawing events
            paintCanvas.addEventListener('mousedown', startPaint);
            paintCanvas.addEventListener('mouseup', stopPaint);
            paintCanvas.addEventListener('mouseleave', stopPaint);
            paintCanvas.addEventListener('mousemove', drawPaint);
            
            paintCanvas.addEventListener('touchstart', startPaint, {passive: false});
            paintCanvas.addEventListener('touchend', stopPaint);
            paintCanvas.addEventListener('touchmove', drawPaint, {passive: false});
            
            // Set initial tool
            currentTool = 'pencil';
            document.querySelectorAll(`[data-tool]`).forEach(btn => btn.classList.remove('active'));
            const pencilBtn = document.querySelector(`[data-tool="pencil"]`);
            if (pencilBtn) pencilBtn.classList.add('active');
        }
        
        function setPaintTool(winId, tool) {
            currentTool = tool;
            document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
            const activeBtn = document.querySelector(`[data-tool="${tool}"]`);
            if (activeBtn) activeBtn.classList.add('active');
            
            const canvas = document.getElementById('paint-canvas-' + winId.split('-')[1]);
            if (canvas) {
                canvas.style.cursor = tool === 'eraser' ? 'cell' : 'crosshair';
            }
        }
        
        function savePaintState() {
            if (!paintCanvas) return;
            paintHistoryStack.push(paintCanvas.toDataURL());
            if (paintHistoryStack.length > 12) paintHistoryStack.shift();
        }
        
        function paintUndo(winId) {
            if (paintHistoryStack.length < 2) return;
            paintHistoryStack.pop();
            const lastState = paintHistoryStack[paintHistoryStack.length - 1];
            
            const img = new Image();
            img.onload = () => {
                if (paintCtx && paintCanvas) {
                    paintCtx.clearRect(0, 0, paintCanvas.width, paintCanvas.height);
                    paintCtx.drawImage(img, 0, 0, paintCanvas.width, paintCanvas.height);
                }
            };
            img.src = lastState;
        }
        
        function startPaint(e) {
            e.preventDefault();
            isPainting = true;
            const pos = getPaintPos(e);
            lastX = pos.x;
            lastY = pos.y;
            
            if (currentTool === 'pencil' || currentTool === 'eraser') {
                paintCtx.beginPath();
                paintCtx.moveTo(lastX, lastY);
            }
            savePaintState();
        }
        
        function stopPaint() {
            isPainting = false;
            if (paintCtx) paintCtx.beginPath();
        }
        
        function getPaintPos(e) {
            const rect = paintCanvas.getBoundingClientRect();
            const clientX = e.clientX || (e.touches && e.touches[0] ? e.touches[0].clientX : 0);
            const clientY = e.clientY || (e.touches && e.touches[0] ? e.touches[0].clientY : 0);
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }
        
        function drawPaint(e) {
            if (!isPainting || !paintCtx) return;
            e.preventDefault();
            
            const pos = getPaintPos(e);
            const colorInput = document.getElementById('paint-color-' + (paintCanvas.id.split('-')[2] || ''));
            const sizeInput = document.getElementById('paint-size-' + (paintCanvas.id.split('-')[2] || ''));
            
            const color = colorInput ? colorInput.value : '#000000';
            const size = sizeInput ? parseFloat(sizeInput.value) : 6;
            
            paintCtx.strokeStyle = color;
            paintCtx.lineWidth = size;
            paintCtx.lineCap = 'round';
            paintCtx.lineJoin = 'round';
            
            if (currentTool === 'pencil') {
                paintCtx.lineTo(pos.x, pos.y);
                paintCtx.stroke();
            } 
            else if (currentTool === 'eraser') {
                paintCtx.strokeStyle = '#f8fafc';
                paintCtx.lineTo(pos.x, pos.y);
                paintCtx.stroke();
            } 
            else if (currentTool === 'line') {
                // For line, we draw on mouse up for simplicity in this demo
                paintCtx.clearRect(0, 0, paintCanvas.width, paintCanvas.height); // simplistic
                // Better would be to save state before and redraw, but for demo:
                paintCtx.beginPath();
                paintCtx.moveTo(lastX, lastY);
                paintCtx.lineTo(pos.x, pos.y);
                paintCtx.stroke();
            } 
            else if (currentTool === 'rect') {
                paintCtx.strokeRect(lastX, lastY, pos.x - lastX, pos.y - lastY);
            } 
            else if (currentTool === 'circle') {
                const radius = Math.sqrt(Math.pow(pos.x - lastX, 2) + Math.pow(pos.y - lastY, 2));
                paintCtx.beginPath();
                paintCtx.arc(lastX, lastY, radius, 0, Math.PI * 2);
                paintCtx.stroke();
            }
            
            lastX = pos.x;
            lastY = pos.y;
        }
        
        function paintClear(winId) {
            if (!paintCtx || !paintCanvas) return;
            paintCtx.fillStyle = '#f8fafc';
            paintCtx.fillRect(0, 0, paintCanvas.width, paintCanvas.height);
            savePaintState();
        }

        function renderChromeTabs(winId) {
            const num = winId.split('-')[1];
            const tabContainer = document.getElementById('chrome-tabs-' + num);
            if (!tabContainer) return;
            
            tabContainer.innerHTML = '';
            const tabs = chromeTabs[winId] || [];
            
            tabs.forEach(tab => {
                const tabEl = document.createElement('div');
                tabEl.className = `tab flex items-center gap-2 px-4 py-1.5 text-xs cursor-pointer rounded-t-2xl ${tab.active ? 'active bg-white' : 'bg-zinc-200'}`;

                tabEl.onclick = () => switchChromeTab(winId, tab.id);
                tabContainer.appendChild(tabEl);
            });
        }
        
        function switchChromeTab(winId, tabId) {
            const num = winId.split('-')[1];
            const tabs = chromeTabs[winId] || [];
            tabs.forEach(t => t.active = t.id === tabId);
            
            const activeTab = tabs.find(t => t.id === tabId);
            if (!activeTab) return;
            
            const content = document.getElementById('chrome-content-' + num);
            const urlInput = document.getElementById('chrome-url-' + num);
            
            if (urlInput) urlInput.value = activeTab.url;
            
            if (activeTab.content === 'newtab') {
                content.innerHTML = `
                    <div class="max-w-md mx-auto mt-10 text-center">
                        <div class="text-6xl font-bold tracking-tighter bg-gradient-to-br from-blue-600 to-sky-400 bg-clip-text text-transparent mb-4">Google</div>
                        <input type="text" placeholder="Search or enter URL" class="w-full border px-5 py-3 rounded-3xl text-sm mb-4 outline-none"
                               onkeydown="if(event.key==='Enter') navigateChromeTab('${winId}', this.value)">
                        <div class="grid grid-cols-4 gap-3 text-xs">
                            ${Object.keys(PROJECTS).map(key => `
                                <div onclick="navigateChromeTab('${winId}', '${PROJECTS[key]}')" class="p-3 border rounded-2xl cursor-pointer hover:bg-zinc-50">
                                    <div class="font-medium">${key}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else {
                // Load iframe or content
                content.innerHTML = `
                    <div class="h-full flex flex-col">
                        <iframe src="${activeTab.url}" class="flex-1 w-full border-0" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
                    </div>
                `;
            }
            
            renderChromeTabs(winId);
        }
        
        function navigateChromeTab(winId, url) {
            const num = winId.split('-')[1];
            const tabs = chromeTabs[winId] || [];
            const activeTab = tabs.find(t => t.active);
            if (!activeTab) return;
            
            if (!url.startsWith('http')) url = 'https://' + url;
            
            activeTab.url = url;
            activeTab.title = url.replace('https://', '').split('/')[0];
            activeTab.content = 'web';
            
            const content = document.getElementById('chrome-content-' + num);
            content.innerHTML = `
                <div class="h-full flex flex-col">
                    <iframe src="${url}" class="flex-1 w-full border-0" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
                </div>
            `;
            
            const urlInput = document.getElementById('chrome-url-' + num);
            if (urlInput) urlInput.value = url;
            
            renderChromeTabs(winId);
        }
        
        function closeChromeTab(winId, tabId) {
            const tabs = chromeTabs[winId] || [];
            const idx = tabs.findIndex(t => t.id === tabId);
            if (idx === -1) return;
            
            tabs.splice(idx, 1);
            
            if (tabs.length === 0) {
                closeWindow(winId);
                return;
            }
            
            // Activate another tab
            if (!tabs.some(t => t.active)) {
                tabs[0].active = true;
            }
            
            renderChromeTabs(winId);
            const active = tabs.find(t => t.active);
            if (active) switchChromeTab(winId, active.id);
        }

        // ==================== VOICE ASSISTANT ====================
        let recognition = null;
        
        function startVoiceAssistant() {
            if (!('SpeechRecognition' in window || 'webkitSpeechRecognition' in window)) {
                alert('Voice recognition not supported in this browser. Try Chrome or Edge.');
                return;
            }
            
            const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRec();
            recognition.lang = 'en-US';
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;
            
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-20 left-1/2 -translate-x-1/2 bg-emerald-600 text-white px-5 py-2 rounded-3xl text-sm flex items-center gap-2 z-[90]';
            toast.innerHTML = `<i class="fas fa-microphone"></i> <span>Listening... Say "Hey Yasin" or a command</span>`;
            document.body.appendChild(toast);
            
            recognition.onresult = (event) => {
                toast.remove();
                const transcript = event.results[0][0].transcript.toLowerCase().trim();
                handleVoiceCommand(transcript);
            };
            
            recognition.onerror = () => {
                toast.remove();
                alert('Voice recognition error. Please try again.');
            };
            
            recognition.onend = () => {
                if (toast.parentNode) toast.remove();
            };
            
            recognition.start();
        }
        
        function handleVoiceCommand(cmd) {
            const speak = (text) => {
                const utter = new SpeechSynthesisUtterance(text);
                window.speechSynthesis.speak(utter);
            };
            
            if (cmd.includes('hey yasin') || cmd.includes('hello yasin')) {
                speak('Hi! How can I help you?');
                return;
            }
            if (cmd.includes('open paint')) {
                openWindow('paint');
                speak('Opening Paint');
            } else if (cmd.includes('open calculator')) {
                openWindow('calculator');
                speak('Opening Calculator');
            } else if (cmd.includes('open notepad')) {
                openWindow('notepad');
                speak('Opening Notepad');
            } else if (cmd.includes('open settings')) {
                openWindow('settings');
                speak('Opening Settings');
            } else if (cmd.includes('open camera')) {
                openWindow('camera');
                speak('Opening Camera');
            } else if (cmd.includes('what time')) {
                const time = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                speak('The time is ' + time);
            } else if (cmd.includes('shutdown') || cmd.includes('restart')) {
                speak('Shutting down simulation');
                setTimeout(() => location.reload(), 1200);
            } else if (cmd.includes('open explorer') || cmd.includes('file explorer')) {
                openWindow('explorer');
                speak('Opening File Explorer');
            } else {
                speak('Sorry, I didn\'t understand that command. Try "open paint" or "what time is it".');
            }
        }

        // ==================== SNIPPING TOOL ====================
        function startSnipping(winId) {
            closeWindow(winId);
            
            const overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.15);z-index:99999;cursor:crosshair';
            document.body.appendChild(overlay);
            
            let startX, startY, selection;
            
            overlay.onmousedown = (e) => {
                startX = e.clientX;
                startY = e.clientY;
                
                selection = document.createElement('div');
                selection.style.cssText = `position:fixed;border:2px dashed #3b82f6;background:rgba(59,130,246,0.1);z-index:100000`;
                document.body.appendChild(selection);
                
                overlay.onmousemove = (ev) => {
                    const x = Math.min(ev.clientX, startX);
                    const y = Math.min(ev.clientY, startY);
                    const w = Math.abs(ev.clientX - startX);
                    const h = Math.abs(ev.clientY - startY);
                    selection.style.left = x + 'px';
                    selection.style.top = y + 'px';
                    selection.style.width = w + 'px';
                    selection.style.height = h + 'px';
                };
            };
            
            overlay.onmouseup = () => {
                overlay.onmousemove = null;
                if (!selection) {
                    overlay.remove();
                    return;
                }
                
                const rect = selection.getBoundingClientRect();
                selection.remove();
                overlay.remove();
                
                // Create canvas from the selected area (approximation using html2canvas alternative)
                html2canvas(document.body).then(canvas => {
                    const cropCanvas = document.createElement('canvas');
                    cropCanvas.width = rect.width;
                    cropCanvas.height = rect.height;
                    const ctx = cropCanvas.getContext('2d');
                    ctx.drawImage(canvas, rect.left, rect.top, rect.width, rect.height, 0, 0, rect.width, rect.height);
                    
                    const a = document.createElement('a');
                    a.download = 'snip-' + Date.now() + '.png';
                    a.href = cropCanvas.toDataURL();
                    a.click();
                }).catch(() => {
                    alert('Screenshot captured (demo). In production we would use html2canvas library.');
                });
            };
        }
        
        // Fallback: load html2canvas dynamically if needed (for snipping)
        function loadHtml2Canvas() {
            if (window.html2canvas) return Promise.resolve();
            return new Promise((resolve) => {
                const s = document.createElement('script');
                s.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
                s.onload = resolve;
                document.head.appendChild(s);
            });
        }

        // ==================== OTHER HELPERS ====================
        function updateClock() {
            const clock = document.getElementById('clock');
            function tick() {
                const now = new Date();
                clock.textContent = now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            }
            tick();
            setInterval(tick, 30000);
        }
        
        function handleDesktopClick(e) {
            const start = document.getElementById('start-menu');
            const tray = document.getElementById('tray-panel');
            const ctx = document.getElementById('context-menu');
            
            if (!start.contains(e.target)) {
                start.classList.add('hidden');
                start.classList.remove('flex');
                startMenuOpen = false;
            }
            if (!tray.contains(e.target) && !e.target.closest('#tray-icons') && !e.target.closest('#clock')) {
                tray.classList.add('hidden');
            }
            if (!ctx.contains(e.target)) ctx.classList.add('hidden');
        }
        
        function showContextMenu(e) {
            e.preventDefault();
            const ctx = document.getElementById('context-menu');
            ctx.style.left = e.pageX + 'px';
            ctx.style.top = e.pageY + 'px';
            ctx.classList.remove('hidden');
        }
        
        function hideContextMenu() {
            document.getElementById('context-menu').classList.add('hidden');
        }
        
        function createNewFolderFake() {
            hideContextMenu();
            const name = prompt('New folder name on desktop:', 'New Folder');
            if (!name) return;
            desktopIcons.push({
                id: 'folder-' + Date.now(),
                label: name,
                icon: 'fa-folder',
                color: 'from-yellow-400 to-amber-500',
                type: 'app',
                app: 'explorer'
            });
            saveToLocalStorage();
            initDesktopIcons();
        }
        
        function toggleStartMenu(e) {
            e.stopImmediatePropagation();
            const menu = document.getElementById('start-menu');
            if (startMenuOpen) {
                menu.classList.add('hidden');
                menu.classList.remove('flex');
                startMenuOpen = false;
            } else {
                menu.classList.remove('hidden');
                menu.classList.add('flex');
                startMenuOpen = true;
            }
        }
        
        function openProjectFromStart(key, url) {
            document.getElementById('start-menu').classList.add('hidden');
            document.getElementById('start-menu').classList.remove('flex');
            startMenuOpen = false;
            openProject(key, url);
        }
        
        function openProject(key, url) {
            window.open(url, '_blank');
            
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-20 left-1/2 -translate-x-1/2 bg-zinc-900 border border-zinc-700 text-white px-5 py-3 rounded-2xl text-sm flex items-center gap-3 z-[90] shadow-xl';
            toast.innerHTML = `
                <i class="fas fa-external-link-alt text-sky-400"></i>
                <span>Opening <strong>${key}</strong>...</span>
            `;
            document.body.appendChild(toast);
            setTimeout(() => {
                toast.style.transition = 'all 0.3s';
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 200);
            }, 1500);
        }
        
        function toggleTrayPanel() {
            const panel = document.getElementById('tray-panel');
            panel.classList.toggle('hidden');
            
            const panelWifi = document.getElementById('panel-wifi-icon');
            if (panelWifi) panelWifi.className = wifiOn ? 'fas fa-wifi text-white' : 'fas fa-wifi text-zinc-400';
        }
        
        function toggleWifi() {
            wifiOn = !wifiOn;
            const icon = document.getElementById('wifi-icon');
            const panelIcon = document.getElementById('panel-wifi-icon');
            const status = document.getElementById('wifi-status');
            
            if (wifiOn) {
                icon.className = 'fas fa-wifi';
                if (panelIcon) panelIcon.className = 'fas fa-wifi text-white';
                if (status) { status.textContent = 'Connected'; status.className = 'text-xs text-emerald-400'; }
            } else {
                icon.className = 'fas fa-wifi text-zinc-500';
                if (panelIcon) panelIcon.className = 'fas fa-wifi text-zinc-400';
                if (status) { status.textContent = 'Off'; status.className = 'text-xs text-zinc-400'; }
            }
        }
        
        function toggleBluetooth(el) {
            el.style.opacity = (el.style.opacity === '0.5') ? '1' : '0.5';
        }
        
        function updateVolume(slider) {
            document.getElementById('volume-value').textContent = slider.value + '%';
        }
        
        function updateBrightness(slider) {
            document.getElementById('brightness-value').textContent = slider.value + '%';
            const desktop = document.getElementById('desktop');
            desktop.style.filter = `brightness(${slider.value / 100})`;
        }
        
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }
        
        function showSearchFake() {
            const q = prompt('Search Windows or apps:');
            if (!q) return;
            if (q.toLowerCase().includes('paint')) openWindow('paint');
            else if (q.toLowerCase().includes('calc')) openWindow('calculator');
            else if (q.toLowerCase().includes('note')) openWindow('notepad');
            else if (q.toLowerCase().includes('setting')) openWindow('settings');
            else alert('No exact match found. Try "paint", "calculator", or "notepad".');
        }
        
        function shutdownFake() {
            const d = document.getElementById('desktop');
            d.style.transition = 'filter 1s ease';
            d.style.filter = 'brightness(0)';
            setTimeout(() => {
                if (confirm('Restart Windows 11 simulation?')) location.reload();
                else d.style.filter = '';
            }, 850);
        }
        
        function calcInput(val, winId) {
            const active = document.getElementById(winId);
            if (!active) return;
            const display = active.querySelector('#calc-display');
            if (!display) return;
            
            let current = display.textContent;
            
            if (val === 'C') { 
                display.textContent = '0'; 
                active.dataset.calcValue = '0'; 
                active.dataset.calcOperator = ''; 
            }
            else if (val === '=') {
                if (active.dataset.calcOperator) {
                    const prev = parseFloat(active.dataset.calcPrevious || '0');
                    const curr = parseFloat(current);
                    let res = 0;
                    const op = active.dataset.calcOperator;
                    if (op === '+') res = prev + curr;
                    if (op === '-') res = prev - curr;
                    if (op === '*') res = prev * curr;
                    if (op === '/') res = prev / curr;
                    display.textContent = res;
                    active.dataset.calcValue = res;
                    active.dataset.calcOperator = '';
                }
            } else if (['+','-','*','/'].includes(val)) {
                active.dataset.calcPrevious = current;
                active.dataset.calcOperator = val;
                display.textContent = '0';
            } else {
                display.textContent = (current === '0' ? val : current + val);
            }
        }
        
        function runTerminalCommand(winId, input) {
            const num = winId.split('-')[1];
            const out = document.getElementById('terminal-output-' + num);
            const cmd = input.value.trim().toLowerCase();
            
            out.innerHTML += `<div>PS C:\\Users\\Yasin&gt; <span class="text-white">${input.value}</span></div>`;
            
            if (cmd === 'help') out.innerHTML += `<div class="text-zinc-400">dir, echo, date, cls, exit, open paint, open ai</div>`;
            else if (cmd === 'dir') out.innerHTML += `<div class="text-zinc-400">Desktop  Documents  Projects  Recycle</div>`;
            else if (cmd.startsWith('echo ')) out.innerHTML += `<div class="text-white">${input.value.substring(5)}</div>`;
            else if (cmd === 'date') out.innerHTML += `<div class="text-zinc-400">${new Date().toLocaleDateString()}</div>`;
            else if (cmd === 'cls') out.innerHTML = '';
            else if (cmd === 'exit') closeWindow(winId);
            else if (cmd.includes('open paint')) { out.innerHTML += `<div>Opening Paint...</div>`; setTimeout(() => openWindow('paint'), 400); }
            else if (cmd.includes('open ai')) { out.innerHTML += `<div>Opening Yasin AI...</div>`; setTimeout(() => openWindow('ai'), 400); }
            else out.innerHTML += `<div class="text-red-400">'${cmd}' is not recognized. Type help.</div>`;
            
            out.scrollTop = out.scrollHeight;
            input.value = '';
        }
        
        function emptyRecycle(btn) {
            btn.closest('.p-5').innerHTML = `<div class="p-8 text-center"><i class="fas fa-trash text-6xl text-zinc-300 mb-4"></i><div class="font-semibold">Recycle Bin is empty</div></div>`;
        }

        // ==================== INITIALIZE ====================
        function initialize() {
            loadFromLocalStorage();
            initDesktopIcons();
            updateClock();
            
            // Seed initial file system if empty
            if (!fileSystem.folders || fileSystem.folders.length === 0) {
                fileSystem.folders = [
                    { name: "Projects", files: [] },
                    { name: "Documents", files: [] }
                ];
            }
            if (!fileSystem.recycle) fileSystem.recycle = [];
            
            // Initial toast
            setTimeout(() => {
                const pw = document.getElementById('panel-wifi-icon');
                if (pw) pw.className = 'fas fa-wifi text-white';
            }, 200);
            
            // Keyboard shortcuts
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Meta' || e.key === 'OS') {
                    e.preventDefault();
                    const m = document.getElementById('start-menu');
                    if (m.classList.contains('hidden')) {
                        m.classList.remove('hidden'); m.classList.add('flex'); startMenuOpen = true;
                    } else {
                        m.classList.add('hidden'); m.classList.remove('flex'); startMenuOpen = false;
                    }
                }
                if (e.key === 'Escape') {
                    const windows = document.querySelectorAll('#window-container > div');
                    if (windows.length > 0) {
                        windows[windows.length - 1].remove();
                        updateOpenWindowsList();
                    } else {
                        const start = document.getElementById('start-menu');
                        if (!start.classList.contains('hidden')) {
                            start.classList.add('hidden');
                            start.classList.remove('flex');
                            startMenuOpen = false;
                        }
                    }
                }
            });
            
            // Preload html2canvas for snipping (optional)
            // loadHtml2Canvas();
            
            console.log('%c[Yasin Namani Windows 11 Enhanced] All features loaded! Draggable icons, Paint Pro, Notepad, AI, Camera, Voice, TaskMgr, Settings + more ✅', 'color:#22c55e');
        }
        
        window.onload = initialize;
    </script>
